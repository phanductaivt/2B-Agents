name: product-development
purpose: Turn one project requirement file into a full product development package led by the BA Agent.
input_type: projects/<project-name>/01-input/requirements/*.md
rules:
  - Start from one clear requirement file.
  - Complete BA analysis and feature structuring before UXUI starts.
  - When the requirement includes functional scope, the BA Agent must generate `feature-list.md` before any downstream handoff.
  - Load project config and project knowledge before using shared fallback knowledge.
  - Use Markdown for all documents except the FE output, which is HTML.
  - Keep the handoff readable for non-technical stakeholders.
  - In controlled mode, run one artifact at a time and respect dependency gates.
  - Downstream artifact should wait when upstream gate or approval is not satisfied.
steps:
  - order: 1
    step: run-ba-analysis-and-structuring
    description: Create clarification, BPMN Mermaid, user story, acceptance criteria, BRD, FRS, and feature list. If functional scope exists, `feature-list.md` is required.
  - order: 2
    step: validate-ba-outputs
    description: Check BA outputs for ambiguity, missing rules, and completeness.
  - order: 3
    step: run-uxui-wireframe
    description: Create a simple Markdown wireframe from the BA outputs.
  - order: 4
    step: run-fe-implementation
    description: Create a simple HTML page based on the BA FRS and wireframe.
  - order: 5
    step: reviewer-consistency-check
    description: Review the BA, UXUI, and FE outputs for consistency.
  - order: 6
    step: final-review-and-save
    description: Save the Markdown and HTML outputs into projects/<project-name>/_ops/generated/<input-name>/ and curated copies into `02-output/`.
decision_logic:
  - id: functional-scope-detected
    when: The requirement describes user actions, business functions, module scope, screen behavior, or functional rules.
    then: Treat `feature-list.md` as a required BA output and finish it before UXUI and FE handoff.
    why: Functional scope is easier to design and build when the BA package already shows the feature hierarchy.
    output_effect: `feature-list.md` must be present and must reflect the same first slice as BRD and FRS.
  - id: weak-ba-foundation
    when: Clarification, business rules, or process flow are still weak.
    then: Stop before UXUI and FE handoff and keep the package in needs-review state.
    why: Weak BA outputs usually cause weak downstream design and implementation.
    output_effect: review-notes.md must clearly explain what must be clarified first.
  - id: oversized-feature
    when: The requirement is too large for one simple design and HTML demo.
    then: Keep the first slice narrow in the BA feature list and wireframe.
    why: A focused first slice is easier for the whole team to review.
    output_effect: feature-list.md must show the first logical feature slice clearly.
  - id: unclear-screen-behavior
    when: The BA FRS does not explain what the user should see or do.
    then: Keep the wireframe low-detail and add open questions before HTML work.
    why: UX/UI and FE outputs should not guess critical behavior.
    output_effect: wireframe.md and review-notes.md must show the missing details.
skills_used:
  - requirement-clarifier
  - process-analyzer
  - bpmn-mermaid-writer
  - user-story-writer
  - acceptance-criteria-writer
  - brd-drafter
  - frs-drafter
  - feature-breakdown-writer
  - wireframe-writer
  - html-implementer
validation_checkpoints:
  - checkpoint: after-ba-output
    validator: ambiguity-checker
    checks:
      - vague wording in clarification, BRD, and FRS
      - unclear assumptions
      - weak process or rule wording
    pass_when: BA outputs are clear enough to guide downstream work.
    fail_action: Mark the package as needs-review before UXUI handoff.
  - checkpoint: before-uxui-handoff
    validator: completeness-checker
    checks:
      - BA outputs include business rules, feature list, and functional detail
      - `feature-list.md` exists whenever the BA package contains functional scope
      - process-bpmn Mermaid is present
      - BRD and FRS are usable for wireframe and FE work
      - FRS includes business rules and edge cases for downstream design and FE work
    pass_when: UXUI can work from the BA package without major missing context.
    fail_action: Return to BA clarification.
  - checkpoint: before-fe-handoff
    validator: consistency-checker
    checks:
      - feature list matches BRD and FRS
      - feature levels are logical and non-overlapping
      - wireframe matches the BA FRS, user story, and acceptance criteria
      - HTML scope matches the agreed first slice
    pass_when: The design and FE handoff stay aligned with the business intent.
    fail_action: Mark the package as needs-review and describe the mismatch in review-notes.md.
expected_outputs:
  markdown_files:
    - clarification.md
    - process-bpmn.md
    - user-story.md
    - acceptance-criteria.md
    - brd.md
    - frs.md
    - feature-list.md
    - wireframe.md
    - review-notes.md
  html_files:
    - ui.html
artifact_execution_model:
  mode_full:
    description: Generate all artifacts in one run.
    default_behavior: fast package generation for baseline output.
  mode_controlled:
    description: Generate one artifact at a time with dependency check.
    control_files:
      - artifact-status.md
      - artifact-checklist.md
      - gate-results.md
      - gate-report.md
      - artifact-reviews/
gate_control:
  dependency_rule: Downstream artifact runs only after all dependencies meet gate and approval rules.
  approval_rule: Approval state is part of gate decision (configured in system/configs/gates.yaml).
  failure_behavior: Mark artifact as Blocked and keep next artifact waiting.
