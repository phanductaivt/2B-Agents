  cards:
    - title: Member Summary
      lines:
        - "<strong>Member:</strong> Example Member"
        - "<strong>Current Tier:</strong> Gold"
    - title: Available Points
      status: 12,450 Points
      lines:
        - The member can see the latest available loyalty balance.
    - title: Tier Progress
      list:
        - Current tier: Gold
        - Points to next tier: 2,550
    - title: Need Help?
      lines:
        - If data is delayed or missing, show guidance and support path.
