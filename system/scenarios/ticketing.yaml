  main_sections:
    - Header
    - Booking summary
    - Eligibility check
    - Change options
    - Fee review
    - Help section
  components:
    - Booking reference summary
    - Eligibility banner
    - Change options list
    - Fee summary panel
    - Support guidance message
  interaction_notes:
    - Show eligibility before deeper actions.
    - Keep fee information visible before confirmation.
    - Show support guidance when online change is not allowed.
  wireframe_sketch:
    - "+--------------------------------------+"
    - "| Header                               |"
    - "+--------------------------------------+"
    - "| Booking Summary                      |"
    - "+--------------------------------------+"
    - "| Eligibility And Fee Review           |"
    - "+--------------------------------------+"
    - "| Change Options                       |"
    - "+--------------------------------------+"
    - "| Help / Support Guidance              |"
    - "+--------------------------------------+"
